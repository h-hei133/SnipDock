name: Build

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build and test on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore SnipDock.sln

      - name: Build
        run: dotnet build SnipDock.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SnipDock.sln --configuration Release --no-build
